<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 | Product Review Form</title>
    <meta name="description" content="Product Review Form for WDD 131 Assignment by Augustine Osazee Airhiavbere">
    <meta name="author" content="Augustine Osazee Airhiavbere">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review Form</h1>
    </header>

    <main>
        <form method="get" action="review.html">
            <!-- Product Name -->
            <label for="productName">Product Name:</label>
            <select id="productName" name="productName" required>
                <option value="" disabled selected>Select a Product ...</option>
                <!-- Options populated dynamically by JavaScript -->
            </select>

            <!-- Overall Rating -->
            <fieldset>
                <legend>Overall Rating:</legend>
                <label for="rating1">
                    <input type="radio" id="rating1" name="rating" value="1" required>
                    <span>☆</span>
                </label>
                <label for="rating2">
                    <input type="radio" id="rating2" name="rating" value="2" required>
                    <span>☆☆</span>
                </label>
                <label for="rating3">
                    <input type="radio" id="rating3" name="rating" value="3" required>
                    <span>☆☆☆</span>
                </label>
                <label for="rating4">
                    <input type="radio" id="rating4" name="rating" value="4" required>
                    <span>☆☆☆☆</span>
                </label>
                <label for="rating5">
                    <input type="radio" id="rating5" name="rating" value="5" required>
                    <span>☆☆☆☆☆</span>
                </label>
            </fieldset>

            <!-- Date of Installation -->
            <label for="installDate">Date of Installation:</label>
            <input type="date" id="installDate" name="installDate" required>

            <!-- Useful Features -->
            <fieldset>
                <legend>Which features did you find useful in the product? (check all that apply):</legend>

                <input type="checkbox" id="feature1" name="features" value="durability">
                <label for="feature1">Durability</label>

                <input type="checkbox" id="feature2" name="features" value="design">
                <label for="feature2">Design</label>

                <input type="checkbox" id="feature3" name="features" value="ease">
                <label for="feature3">Ease of Use</label>

                <input type="checkbox" id="feature4" name="features" value="support">
                <label for="feature4">Customer Support</label>
            </fieldset>

            <!-- Written Review -->
            <label for="reviewText">Written Review:</label>
            <textarea id="reviewText" name="reviewText" rows="4" cols="40"
                placeholder="Write your review here..."></textarea>

            <!-- User Name -->
            <label for="userName">Your Name (optional):</label>
            <input type="text" id="userName" name="userName">

            <!-- Submit Button -->
            <input type="submit" value="Submit Review">
        </form>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> | Product Review | By 🌴Augustine O. Airhiavbere 🌴</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
